[package]
name = "cambios-terminal-window"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"

[dependencies]
cambios-libsys = { path = "../libsys" }
cambios-libterm = { path = "../libterm" }
cambios-libgui = { path = "../libgui" }
cambios-libgui-proto = { path = "../libgui-proto" }
cambios-libinput-proto = { path = "../libinput-proto" }
linked_list_allocator = { version = "0.10", default-features = false, features = ["use_spin"] }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = false
panic = "abort"
