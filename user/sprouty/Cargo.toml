[package]
name = "cambios-sprouty"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "CambiOS Super Sprouty-O — fourth first-party HN-launch mini-game. Single-level scrolling platformer on a reforested-world theme (gardener, seeds, invasive weeds, flowering-tree goal). Original art / character / level; no Nintendo IP. First game past ping's 20 FPS — runs at 33 FPS to stress-test the scanout path. Crate name shortened to `sprouty` for launchability; in-game branding remains `Super Sprouty-O`."

[dependencies]
cambios-libsys = { path = "../libsys" }
cambios-libsys-rt = { path = "../libsys-rt" }
cambios-libgui = { path = "../libgui" }

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = false
panic = "abort"
