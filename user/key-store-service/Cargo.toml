[package]
name = "cambios-key-store-service"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"

[features]
default = []
# Loads the software-emulated PIV backend (`SwPivBackend`) using the
# Ed25519+X25519 keys generated by `make gen-dev-piv-keys`. Pairs with
# the kernel's matching `--features dev-piv` so signature verification
# at SYS_OBJ_PUT_SIGNED + FDE volume header verify agree on the
# bootstrap pubkey. ADR-032 § Migration Path step 2.
dev-piv = []

[dependencies]
cambios-libsys = { path = "../libsys" }
ed25519-compact = { version = "2.2", default-features = false, features = ["x25519"] }

[profile.release]
opt-level = "s"        # Size-optimized (small ELF)
lto = true
codegen-units = 1
strip = false          # Keep symbols for kernel loader debug
panic = "abort"
