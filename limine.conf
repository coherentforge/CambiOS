timeout: 1
serial: yes

/CambiOS Microkernel
    protocol: limine
    kernel_path: boot():/boot/cambios_microkernel
    # Module order is load-bearing (x86_64). Index 0 boots Ready; indices
    # 1..N start Blocked on BlockReason::BootGate and are released
    # one-by-one by SYS_MODULE_READY. Dependencies:
    #   policy-service  — first, backs on_syscall for everyone.
    #   key-store       — second, fs-service IPCs it for signing.
    #   fs-service      — third, persistent-storage gateway.
    #   virtio-blk      — before shell; arcobj lazy-disk handshake.
    #   compositor      — Phase Scanout-1 scaffold (ADR-014). No deps —
    #                     registers endpoint 28, enters headless mode,
    #                     idles. Placed before shell so a future
    #                     scanout-driver can register before any
    #                     interactive work begins.
    #   tree            — First-party CambiOS app (Minesweeper homage).
    #                     Replaces hello-window as the default GUI boot
    #                     module now that libgui + virtio-input are
    #                     stable; hello-window stays buildable in-tree
    #                     for regression testing of the raw handshake.
    #                     Must come after compositor + virtio-input so
    #                     endpoints 28/30 are registered before tree
    #                     opens its window and starts draining events.
    #                     Before shell so the game is visible before
    #                     the serial prompt paints.
    #   shell           — last: all upstream services must be up.
    # Disabled: virtio-net, i219-net, udp-stack, hello, fb-demo,
    # hello-window.
    # fb-demo's role (smoke-test the framebuffer mapping) is now taken
    # over by user/scanout-limine (Scanout-2, ADR-014).
    #
    # scanout-limine MUST come before compositor: the compositor's
    # startup handshake (RegisterCompositor → WelcomeCompositor) needs
    # SCANOUT_DRIVER_ENDPOINT (27) to be registered before the
    # compositor sends to it. Boot-gate ordering guarantees this.
    # scanout-virtio-gpu is Phase Scanout-4.b — the default scanout
    # driver. Registers SCANOUT_DRIVER_ENDPOINT (=27), allocates a
    # DMA-backed virtio-gpu resource per display, creates a shared
    # channel with the compositor, and on each FrameReady runs:
    # memcpy(channel → backing) + TRANSFER_TO_HOST_2D + RESOURCE_FLUSH.
    # scanout-limine is still built (used when virtio-gpu-pci is
    # absent, e.g. future non-QEMU host), but not loaded here — the
    # default make run / run-gui targets always include
    # -device virtio-gpu-pci, so this driver wins.
    #   virtio-input    — ADR-012 Input-1 via virtio-pci. Must come
    #                     AFTER compositor so ep30 is registered
    #                     before any event tries to `sys::write(30, …)`;
    #                     must come BEFORE hello-window so a window is
    #                     ready to receive routed events the instant
    #                     it pops up.
    module_path: boot():/boot/policy-service.elf
    module_path: boot():/boot/key-store-service.elf
    module_path: boot():/boot/fs-service.elf
    module_path: boot():/boot/virtio-blk.elf
    module_path: boot():/boot/scanout-virtio-gpu.elf
    module_path: boot():/boot/compositor.elf
    module_path: boot():/boot/virtio-input.elf
    module_path: boot():/boot/tree.elf
    module_path: boot():/boot/shell.elf
