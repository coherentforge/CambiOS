timeout: 1
serial: yes

/CambiOS Microkernel
    protocol: limine
    kernel_path: boot():/boot/cambios_microkernel
    # Module order is load-bearing. Index 0 boots Ready; indices 1..N start
    # Blocked on BlockReason::BootGate and are released one-by-one by
    # SYS_MODULE_READY. Dependencies that matter:
    #   policy-service  — first, because it backs on_syscall for everyone.
    #   key-store       — second, so fs-service can IPC it for signing.
    #   fs-service      — third, so any persistent-storage caller is up.
    #   virtio-blk      — before shell; shell's arcobj uses the lazy-disk
    #                     handshake which needs blk's endpoint 26.
    #   shell           — last of the "real" services.
    #   hello.elf       — absolute last: print-and-exit canary. No
    #                     service loop, never calls module_ready(), so
    #                     the chain must terminate before it.
    # virtio-net, i219-net, udp-stack, fb-demo disabled — scaffolded
    # drivers that hang in PCI discovery / block downstream services.
    module_path: boot():/boot/policy-service.elf
    module_path: boot():/boot/key-store-service.elf
    module_path: boot():/boot/fs-service.elf
    module_path: boot():/boot/virtio-blk.elf
    module_path: boot():/boot/shell.elf
    # module_path: boot():/boot/fb-demo.elf
    module_path: boot():/boot/hello.elf
