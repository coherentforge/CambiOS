# Override the parent project's bare-metal kernel target so this crate
# can be built and tested standalone (`cd cambios-manifest && cargo
# test`). Same rationale and precedent as cambios-abi/.cargo/config.toml:
# the crate is `no_std` and architecture-agnostic, so the native host
# triple avoids cross-compile overhead and links the test runner.
[build]
target = "aarch64-apple-darwin"
