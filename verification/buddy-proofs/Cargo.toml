# Standalone proof crate for the kernel's BuddyAllocator. Excluded from the
# kernel workspace (see root Cargo.toml). Builds under Kani's bundled
# toolchain via `cargo kani` from this directory.
#
# The proven source is the kernel's `src/memory/buddy_allocator.rs`,
# included verbatim via `#[path = ...]` — no copy, no fork. If the kernel
# code changes, the proofs here cover the new code automatically.

[package]
name = "buddy-proofs"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
path = "src/lib.rs"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
