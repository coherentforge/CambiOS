#
# AArch64 boot manifest. Mirrors limine.conf (x86_64) now that the kernel
# has an ECAM-based PCI enumerator (src/pci/mod.rs `mod ecam`), so
# scanout-virtio-gpu, virtio-input, compositor, and the games can
# discover and drive their virtio-pci devices through the same
# `SYS_DEVICE_INFO` syscall that x86_64 uses. scanout-limine.elf is
# still omitted because QEMU virt + `-display none` does not expose a
# Limine framebuffer device; the compositor uses scanout-virtio-gpu as
# its driver instead.
#
# Game modules (tree, worm, pong, super-sprouty-o) are listed here so
# Limine loads their bytes into EXECUTABLE_AND_MODULES, but the kernel's
# SPAWN_ONLY_MODULES list in src/microkernel/main.rs registers them in
# BOOT_MODULE_REGISTRY and skips process creation. Boot lands at the
# shell prompt; `play <name>` launches a game on demand.
#
# Revisit when: a Limine-reported framebuffer shows up on aarch64 (e.g.
# a real UEFI GOP path), at which point scanout-limine can be re-added
# as a fallback driver alongside scanout-virtio-gpu.

timeout: 1
serial: yes

/CambiOS Microkernel
    protocol: limine
    kernel_path: boot():/boot/cambios_microkernel
    module_path: boot():/boot/policy-service.elf
    module_path: boot():/boot/key-store-service.elf
    module_path: boot():/boot/fs-service.elf
    module_path: boot():/boot/virtio-blk.elf
    module_path: boot():/boot/virtio-net.elf
    module_path: boot():/boot/udp-stack.elf
    module_path: boot():/boot/scanout-virtio-gpu.elf
    module_path: boot():/boot/virtio-input.elf
    module_path: boot():/boot/compositor.elf
    module_path: boot():/boot/terminal-window.elf
    module_path: boot():/boot/pong.elf
    module_path: boot():/boot/super-sprouty-o.elf
    module_path: boot():/boot/tree.elf
    module_path: boot():/boot/worm.elf
    module_path: boot():/boot/audit-tail.elf
    module_path: boot():/boot/shell.elf
