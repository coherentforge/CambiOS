#
# AArch64 boot manifest. Split from the shared limine.conf because
# scanout-virtio-gpu and virtio-input have not been ported to aarch64
# (deferred under ADR-014 Scanout-4.c and ADR-012 input parity). Shipping
# them in the limine.conf that img-aarch64 mcopies onto the FAT image
# made limine halt on "module not found" before the kernel ran.
#
# Divergence from limine.conf (x86_64):
#   - scanout-virtio-gpu.elf omitted. ADR-014 Scanout-4.c defers the
#     aarch64 virtio-gpu port.
#   - scanout-limine.elf omitted. QEMU virt + `-display none` does not
#     expose a framebuffer device, so Limine reports zero framebuffers
#     and SYS_MAP_FRAMEBUFFER returns InvalidArg. scanout-limine exits
#     before `sys::module_ready()`, which stalls the boot chain.
#   - compositor.elf, worm.elf, virtio-input.elf omitted. compositor's
#     handshake_with_scanout_driver (user/compositor/src/main.rs:103)
#     does a blocking `sys::recv_verified(COMPOSITOR_ENDPOINT, …)` on
#     WelcomeCompositor with no timeout — if no scanout driver is
#     present, it hangs and the boot chain stalls. The in-tree TODO
#     ("Future runtime hotplug will need a timed handshake") is the
#     long-term fix. Worm depends on compositor; virtio-input depends
#     on virtio-pci-input HW. All three come back in Scanout-4.c when
#     the aarch64 virtio-gpu + virtio-input drivers land.
# Revisit when: Scanout-4.c lands the aarch64 virtio-gpu + virtio-input
# ports; at that point this file's module_path list converges back
# toward the x86_64 shape.

timeout: 1
serial: yes

/CambiOS Microkernel
    protocol: limine
    kernel_path: boot():/boot/cambios_microkernel
    module_path: boot():/boot/policy-service.elf
    module_path: boot():/boot/key-store-service.elf
    module_path: boot():/boot/fs-service.elf
    module_path: boot():/boot/virtio-blk.elf
    module_path: boot():/boot/virtio-net.elf
    module_path: boot():/boot/udp-stack.elf
    module_path: boot():/boot/shell.elf
