[package]
name = "arcos"
version = "0.1.0"
edition = "2021"
authors = ["ArcOS Development Team"]

[dependencies]
x86_64 = { version = "0.14", features = ["instructions"] }
uart_16550 = "0.3"
bitflags = "2.3"
limine = "0.5"

[profile.release]
opt-level = 2
lto = false
codegen-units = 1
strip = false

[profile.dev]
opt-level = 0

[[bin]]
name = "arcos_microkernel"
path = "src/microkernel/main.rs"

[lib]
name = "arcos_core"
path = "src/lib.rs"
